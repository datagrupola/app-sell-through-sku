name: Deploy Sell-Through Chunk Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-chunk-worker:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: lztornyogibsaswcviss

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy chunk worker
        run: |
          supabase functions deploy calculate-sell-through-chunk-v1 \
            --project-ref "$SUPABASE_PROJECT_REF"
