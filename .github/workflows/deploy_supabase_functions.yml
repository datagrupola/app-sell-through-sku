name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: lztornyogibsaswcviss
      BSALE_ACCESS_TOKEN: ${{ secrets.BSALE_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WORKFLOW_DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            BSALE_ACCESS_TOKEN="$BSALE_ACCESS_TOKEN" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            WORKFLOW_DISPATCH_TOKEN="$WORKFLOW_DISPATCH_TOKEN" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy lookup-sku-live
        run: |
          supabase functions deploy lookup-sku-live --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy request-live-traceability
        run: |
          supabase functions deploy request-live-traceability --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy calculate-sell-through-live
        run: |
          supabase functions deploy calculate-sell-through-live --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy calculate-sell-through-live-v2
        run: |
          supabase functions deploy calculate-sell-through-live-v2 --project-ref "$SUPABASE_PROJECT_REF"
      
      - name: Deploy calculate-sell-through-live-v2-audit
        run: |
          supabase functions deploy calculate-sell-through-live-v2-audit --project-ref "$SUPABASE_PROJECT_REF"
